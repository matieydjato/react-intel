name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  pack-smoke:
    name: Pack & install smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm pack --pack-destination .

      - name: Install tarball in fresh project & run CLI
        run: |
          TARBALL=$(ls "$GITHUB_WORKSPACE"/*.tgz | head -n 1)
          echo "Using tarball: $TARBALL"
          mkdir /tmp/smoke && cd /tmp/smoke
          npm init -y > /dev/null
          npm install "$TARBALL" --no-audit --no-fund
          cp "$GITHUB_WORKSPACE"/tests/fixtures/Button.tsx .
          npx react-spec-gen Button.tsx -y
          test -f Button.test.tsx
          test -f Button.stories.tsx
